name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            bin: mobicontrol-api-tester
            archive: mobicontrol-api-tester-${{ github.ref_name }}-x86_64-linux.tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            bin: mobicontrol-api-tester.exe
            archive: mobicontrol-api-tester-${{ github.ref_name }}-x86_64-windows.zip

    steps:
      - uses: actions/checkout@v5

      - name: Install Linux GUI build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libxkbcommon-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry & build
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --offline --target ${{ matrix.target }}

      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/${{ matrix.bin }} dist/
          cp sample_swagger.json README.md dist/
          tar -czvf ${{ matrix.archive }} -C dist .

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/${{ matrix.bin }}" -Destination dist/
          Copy-Item sample_swagger.json,README.md -Destination dist/
          Compress-Archive -Path dist/* -DestinationPath ${{ matrix.archive }}

      - name: Upload to release
        uses: softprops/action-gh-release@v3
        with:
          files: ${{ matrix.archive }}
          draft: false
          generate_release_notes: true
